model:
  default: glm-5.2
  provider: zai
  base_url: https://api.z.ai/api/coding/paas/v4
agent:
  max_turns: 150
  reasoning_effort: medium
  api_max_retries: 1
providers:
  zai:
    request_timeout_seconds: 300
    stale_timeout_seconds: 120
streaming:
  enabled: true
terminal:
  timeout: 600
code_execution:
  timeout: 600
  max_tool_calls: 200
delegation:
  max_iterations: 200
